services:
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      PGPORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - supabase-db:/var/lib/postgresql/data
      - ./docker/supabase/bootstrap.sql:/docker-entrypoint-initdb.d/init-scripts/99-mike-bootstrap.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:${SUPABASE_PORT}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GOTRUE_SITE_URL: http://localhost:${FRONTEND_PORT}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: localhost
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: fake_mail_user
      GOTRUE_SMTP_PASS: fake_mail_password
      GOTRUE_SMTP_SENDER_NAME: MikePT Local
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  rest:
    image: postgrest/postgrest:v14.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}

  supabase:
    image: kong/kong:3.9.1
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    ports:
      - "${SUPABASE_PORT}:8000"
    volumes:
      - ./docker/supabase/kong.yml:/etc/kong/kong.yml.template:ro
      - ./docker/supabase/kong-entrypoint.sh:/docker-entrypoint.sh:ro
    entrypoint: ["/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  schema:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend/schema.sql:/schema.sql:ro
      - ./docker/supabase/apply-schema.sh:/apply-schema.sh:ro
    command: ["/apply-schema.sh"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    volumes:
      - ./docker/minio/create-bucket.sh:/create-bucket.sh:ro
    entrypoint: ["/create-bucket.sh"]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      schema:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:${FRONTEND_PORT}
      SUPABASE_URL: http://supabase:8000
      SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      S3_FORCE_PATH_STYLE: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENABLE_LOCAL_LLM: ${ENABLE_LOCAL_LLM}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      LOCAL_LLM_LABEL: ${LOCAL_LLM_LABEL:-Local model}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_SUPPORTS_TOOLS: ${LOCAL_LLM_SUPPORTS_TOOLS:-false}
      LOCAL_LLM_TIMEOUT_MS: ${LOCAL_LLM_TIMEOUT_MS:-120000}
    ports:
      - "${BACKEND_PORT}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:${SUPABASE_PORT}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${ANON_KEY}
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT}
        SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:${SUPABASE_PORT}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${ANON_KEY}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT}
      SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}
    ports:
      - "${FRONTEND_PORT}:3000"

volumes:
  supabase-db:
  minio-data:
